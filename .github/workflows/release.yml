name: Publish release

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.23"
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --locked --extra test
      - name: Validate release identity
        run: >-
          uv run python -m scripts.release.validate_release
          --action '${{ github.event.action }}'
          --tag '${{ github.event.release.tag_name }}'
          --prerelease '${{ github.event.release.prerelease }}'
          --target-commitish '${{ github.event.release.target_commitish }}'
          --require-clean

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.23"
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --locked --extra test
      - run: uv run python -m scripts.release.build_and_check
      - run: mkdir -p manifest && mv dist/SHA256SUMS manifest/SHA256SUMS
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-distributions-${{ github.event.release.tag_name }}
          path: |
            dist/*.whl
            dist/*.tar.gz
            manifest/SHA256SUMS
          if-no-files-found: error
          retention-days: 90

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/auth-ingress
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions-${{ github.event.release.tag_name }}
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

  verify-testpypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.23"
          python-version: "3.14"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions-${{ github.event.release.tag_name }}
          path: dist
      - run: >-
          uv run --with packaging python -m scripts.release.verify_staged_release
          --index testpypi
          --version '${{ github.event.release.tag_name }}'
          --manifest manifest/SHA256SUMS
          --smoke-script tests/smoke/test_installed_package.py

  publish-pypi:
    needs: verify-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/auth-ingress
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions-${{ github.event.release.tag_name }}
          path: dist
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist

  verify-pypi:
    needs: publish-pypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.23"
          python-version: "3.14"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-distributions-${{ github.event.release.tag_name }}
          path: dist
      - run: >-
          set -o pipefail;
          uv run --with packaging python -m scripts.release.verify_index
          --index pypi
          --version '${{ github.event.release.tag_name }}'
          --manifest manifest/SHA256SUMS
          --revision '${{ github.sha }}'
          --require-provenance
          | tee -a "$GITHUB_STEP_SUMMARY"
