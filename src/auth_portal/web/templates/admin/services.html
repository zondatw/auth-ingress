{% extends "base.html" %}
{% block title %}Manage services · Auth Portal{% endblock %}
{% block content %}
<div class="title-row"><div><p class="eyebrow">Administration</p><h1>Service entries</h1></div><a href="/admin/audit">Audit events</a></div>
{% if error %}<div class="alert" role="alert">{{ error }}</div>{% endif %}
<section class="panel"><h2>Add service</h2><form method="post" action="/admin/services" class="form-grid">
<input type="hidden" name="csrf" value="{{ csrf_token }}">
<label>Slug<input name="slug" pattern="[a-z0-9-]+" required></label><label>Display name<input name="display_name" required></label>
<label class="wide">Description<input name="description"></label><label class="wide">Internal destination<input name="destination" placeholder="https://app.internal" required></label>
<label>Status<select name="status"><option>enabled</option><option>disabled</option></select></label><label>Groups (comma separated)<input name="group_names" required></label><button type="submit">Add service</button>
</form></section>
<div class="stack">{% for service in services %}<section class="panel"><form method="post" action="/admin/services/{{ service.slug }}" class="form-grid">
<input type="hidden" name="csrf" value="{{ csrf_token }}"><label>Slug<input name="slug" value="{{ service.slug }}" required></label><label>Display name<input name="display_name" value="{{ service.display_name }}" required></label>
<label class="wide">Description<input name="description" value="{{ service.description or '' }}"></label><label class="wide">Internal destination<input name="destination" value="{{ service.destination }}" required></label>
<label>Status<select name="status"><option {% if service.status == 'enabled' %}selected{% endif %}>enabled</option><option {% if service.status == 'disabled' %}selected{% endif %}>disabled</option></select></label><label>Groups (comma separated)<input name="group_names" required></label><button type="submit">Save changes</button>
</form></section>{% endfor %}</div>
{% endblock %}
