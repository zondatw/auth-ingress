{% extends "base.html" %}
{% block title %}Change password · auth-ingress{% endblock %}
{% block content %}
<section class="panel narrow">
  <div class="page-header"><div><p class="eyebrow">First sign-in</p><h1>Change your password</h1></div></div>
  <p>Your administrator gave you a temporary password. Choose a new password before continuing.</p>
  {% if error %}<div class="alert" role="alert">{{ error }}</div>{% endif %}
  <form method="post" action="/change-password">
    <input type="hidden" name="csrf" value="{{ csrf_token }}">
    <label>New password<input type="password" name="password" autocomplete="new-password" minlength="10" required></label>
    <label>Confirm password<input type="password" name="password_confirm" autocomplete="new-password" minlength="10" required></label>
    <button type="submit">Change password</button>
  </form>
</section>
{% endblock %}
