{% extends "base.html" %}
{% block title %}Set password · auth-ingress{% endblock %}
{% block content %}<section class="panel narrow"><p class="eyebrow">Account recovery</p><h1>Set your password</h1>{% if error %}<div class="alert" role="alert">{{ error }}</div>{% else %}<form method="post" action="/reset-password"><input type="hidden" name="csrf" value="{{ csrf_token }}"><label>New password<input type="password" name="password" autocomplete="new-password" minlength="10" required></label><label>Confirm password<input type="password" name="password_confirm" autocomplete="new-password" minlength="10" required></label><button type="submit">Set password</button></form>{% endif %}</section>{% endblock %}
